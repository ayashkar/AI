<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StyleHub - Clothes Store</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>StyleHub</h1>
      <p>Your online clothes store</p>
      <div class="cart-summary">Cart: <span id="cart-count">0</span> items</div>
    </header>

    <main>
      <section class="filters">
        <label for="category">Category:</label>
        <select id="category">
          <option value="all">All</option>
          <option value="tops">Tops</option>
          <option value="bottoms">Bottoms</option>
          <option value="shoes">Shoes</option>
          <option value="accessories">Accessories</option>
        </select>
      </section>

      <section id="products" class="product-grid" aria-live="polite"></section>

      <section class="cart" aria-labelledby="cart-title">
        <h2 id="cart-title">Shopping Cart</h2>
        <ul id="cart-items"></ul>
        <p class="total">Total: $<span id="cart-total">0.00</span></p>
        <button id="checkout-btn" type="button">Checkout</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
